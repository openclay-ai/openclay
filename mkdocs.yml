site_name: OpenClay
site_description: The Secure-by-Default Execution Framework for LLM Agents
site_url: https://doc.neuralchemy.in
repo_url: https://github.com/openclay-ai/openclay
repo_name: openclay-ai/openclay

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Core Modules:
    - Shields: core/shields.md
    - Runtime: core/runtime.md
    - Tools: core/tools.md
  - Agents:
    - Knight & Squad: agents/knights.md
    - Golem: agents/golem.md
    - Memory: agents/memory.md
  - Security:
    - Policies: security/policies.md
    - Tracing & Telemetry: security/tracing.md
  - Integrations: integrations/frameworks.md
  - API Reference: api/reference.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
